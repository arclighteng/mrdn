    - text: Market risk signal from abnormal stock movements, volume spikes, and options activity around political events. Policy risk from government contracts, sanctions exposure, regulatory actions, and lobbying connections. Insider risk from congressional trading, executive financial disclosures, and related-party transactions. Weighted combination of Market, Policy, and Insider scores. 0-39 = low risk (green), 40-69 = moderate (yellow), 70-100 = high (red). Overall political risk — weighted blend of all sub-scores. The coloured bar shows how much each sub-score contributes to this total. Abnormal price/volume activity around political events. Weighted 35% of composite. Government contracts, sanctions, and regulatory exposure. Weighted 40% of composite. Congressional trades and executive financial disclosures. Weighted 25% of composite. 50th percentile of (filed_at − traded_at) 90th percentile — the long tail -1 = all D activity, +1 = all R activity, 0 = perfectly split -1 = all D activity, +1 = all R activity, 0 = perfectly split Distinct representatives who bought or sold this ticker
