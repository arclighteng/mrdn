name: Build & Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            adamreed/mrdn:latest
            adamreed/mrdn:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Point Railway services at SHA-tagged image (forces fresh pull)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          API_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          INGEST_SERVICE_ID: ${{ secrets.RAILWAY_INGEST_SERVICE_ID }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          SHA: ${{ github.sha }}
        run: |
          deploy_service() {
            local name="$1"
            local service_id="$2"
            if [ -z "$service_id" ]; then
              echo "Skipping $name — no service id set"
              return 0
            fi
            echo "=== Updating $name ($service_id) to adamreed/mrdn:$SHA ==="
            curl -sS -X POST https://backboard.railway.app/graphql/v2 \
              -H "Project-Access-Token: $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation(\$serviceId: String!, \$environmentId: String, \$input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: \$serviceId, environmentId: \$environmentId, input: \$input) }\",\"variables\":{\"serviceId\":\"$service_id\",\"environmentId\":\"$ENV_ID\",\"input\":{\"source\":{\"image\":\"adamreed/mrdn:$SHA\"}}}}" | tee /tmp/railway-update-$name.json
            grep -q '"errors"' /tmp/railway-update-$name.json && { echo "$name update error"; exit 1; } || true

            echo "=== Deploying $name ==="
            curl -sS -X POST https://backboard.railway.app/graphql/v2 \
              -H "Project-Access-Token: $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation(\$serviceId: String!, \$environmentId: String!) { serviceInstanceDeployV2(serviceId: \$serviceId, environmentId: \$environmentId) }\",\"variables\":{\"serviceId\":\"$service_id\",\"environmentId\":\"$ENV_ID\"}}" | tee /tmp/railway-deploy-$name.json
            grep -q '"errors"' /tmp/railway-deploy-$name.json && { echo "$name deploy error"; exit 1; } || true
          }

          deploy_service "mrdn-api" "$API_SERVICE_ID"
          deploy_service "mrdn-ingest" "$INGEST_SERVICE_ID"
