name: Build & Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            adamreed/mrdn:latest
            adamreed/mrdn:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Point Railway at SHA-tagged image (forces fresh pull)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          SHA: ${{ github.sha }}
        run: |
          curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Project-Access-Token: $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation(\$serviceId: String!, \$environmentId: String, \$input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: \$serviceId, environmentId: \$environmentId, input: \$input) }\",\"variables\":{\"serviceId\":\"$SERVICE_ID\",\"environmentId\":\"$ENV_ID\",\"input\":{\"source\":{\"image\":\"adamreed/mrdn:$SHA\"}}}}" | tee /tmp/railway-update.json
          grep -q '"errors"' /tmp/railway-update.json && { echo "Update error"; exit 1; } || true

          curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Project-Access-Token: $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation(\$serviceId: String!, \$environmentId: String!) { serviceInstanceDeployV2(serviceId: \$serviceId, environmentId: \$environmentId) }\",\"variables\":{\"serviceId\":\"$SERVICE_ID\",\"environmentId\":\"$ENV_ID\"}}" | tee /tmp/railway-deploy.json
          grep -q '"errors"' /tmp/railway-deploy.json && { echo "Deploy error"; exit 1; } || true
