services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mrdn
      POSTGRES_USER: mrdn
      POSTGRES_PASSWORD: mrdn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrdn"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
